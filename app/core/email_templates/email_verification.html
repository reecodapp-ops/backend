<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Verify your DukaMate email</title>
</head>
<body style="margin:0;padding:0;background:#f5f5f6;font-family:Inter,Arial,sans-serif;color:#1a1a1a;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
  <tr><td align="center" style="padding:32px 12px;">
    <table role="presentation" width="520" cellspacing="0" cellpadding="0" border="0" style="background:#ffffff;border-radius:12px;overflow:hidden;">
      <tr><td style="padding:32px 32px 8px 32px;">
        <h1 style="margin:0;font-size:22px;color:#0f5132;">Welcome to {app_name}</h1>
      </td></tr>
      <tr><td style="padding:8px 32px 0 32px;font-size:15px;line-height:1.55;">
        <p style="margin:0 0 16px 0;">Hi {full_name},</p>
        <p style="margin:0 0 16px 0;">Use the code below to verify your email and finish creating your account. It expires in <b>{ttl_minutes} minutes</b>.</p>
      </td></tr>
      <tr><td align="center" style="padding:8px 32px 24px 32px;">
        <div style="display:inline-block;padding:16px 28px;background:#eef6f1;border-radius:10px;font-family:'SFMono-Regular',Menlo,Consolas,monospace;font-size:30px;letter-spacing:8px;color:#0f5132;font-weight:700;">{code}</div>
      </td></tr>
      <tr><td style="padding:0 32px 24px 32px;font-size:13px;color:#6b6b6b;line-height:1.5;">
        <p style="margin:0;">If you didn't sign up, you can safely ignore this email — no account will be created without verifying.</p>
      </td></tr>
      <tr><td style="padding:16px 32px;background:#fafafa;font-size:12px;color:#9b9b9b;">
        &copy; {app_name}
      </td></tr>
    </table>
  </td></tr>
</table>
</body>
</html>
